<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <title>NEMS — Neighbourhood Environmental Monitoring</title>
  <meta name="description" content="Real-time weather and forecasts for Mindanao communities. No sign-up required.">
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" sizes="32x32" href="logo.png?v=2">
  <link rel="icon" type="image/x-icon" href="favicon.ico?v=2">
  <link rel="apple-touch-icon" href="apple-touch-icon.png?v=2">
</head>
<body>
  <button
    type="button"
    class="nems-theme-toggle"
    id="nems-theme-toggle"
    data-theme-state="light"
    aria-label="Switch to dark mode"
    aria-pressed="false"
    title="Dark mode"
  >
    <svg class="nems-theme-toggle__icon nems-theme-toggle__icon--moon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <path fill="currentColor" d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z" />
    </svg>
    <svg class="nems-theme-toggle__icon nems-theme-toggle__icon--sun" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <circle cx="12" cy="12" r="5" fill="currentColor" />
      <g stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="12" y1="1" x2="12" y2="3" />
        <line x1="12" y1="21" x2="12" y2="23" />
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
        <line x1="1" y1="12" x2="3" y2="12" />
        <line x1="21" y1="12" x2="23" y2="12" />
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
      </g>
    </svg>
  </button>

  <app-root></app-root>

  <script>
    (function () {
      var key = 'nems-theme';
      var button = document.getElementById('nems-theme-toggle');

      function applyTheme(theme, persist) {
        document.documentElement.setAttribute('data-theme', theme);
        document.documentElement.style.colorScheme = theme;
        document.documentElement.classList.toggle('theme-dark', theme === 'dark');

        if (persist) {
          localStorage.setItem(key, theme);
        }

        if (!button) {
          return;
        }

        var isDark = theme === 'dark';
        button.setAttribute('data-theme-state', theme);
        button.setAttribute('aria-pressed', isDark ? 'true' : 'false');
        button.setAttribute('aria-label', isDark ? 'Switch to light mode' : 'Switch to dark mode');
        button.setAttribute('title', isDark ? 'Light mode' : 'Dark mode');
      }

      var stored = localStorage.getItem(key);
      var prefersDark =
        window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      var theme =
        stored === 'dark' || stored === 'light' ? stored : prefersDark ? 'dark' : 'light';

      applyTheme(theme, false);

      if (button) {
        button.addEventListener('click', function () {
          var current =
            document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
          applyTheme(current === 'dark' ? 'light' : 'dark', true);
        });
      }
    })();
  </script>
</body>
</html>
